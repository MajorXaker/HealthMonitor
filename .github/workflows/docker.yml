name: Build & Push Docker Image

# Triggers:
#   - Push to master → builds and pushes image tagged :latest + :<sha>
#   - Any tag vX.Y.Z     → additionally tags the image :<version>
#   - Pull requests       → build-only (no push), to catch breakage early
on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master

env:
  # Change to your Docker Hub username or ghcr.io namespace.
  # Examples:
  #   Docker Hub : youruser/healthmon
  #   GHCR       : ghcr.io/youruser/healthmon
  IMAGE_NAME: MajorXaker/healthmon

jobs:
  build-and-push:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed only when pushing to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (not strictly needed for amd64-only, but kept for
      #       future multi-arch extension with zero extra cost) ───────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to registry (skipped on pull requests) ─────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Derive image tags from git context ─────────────────────────────
      # Produces tags such as:
      #   :latest              on push to main/master
      #   :abc1234             short SHA, always
      #   :v1.2.3              on a vX.Y.Z tag push
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      # ── 6. Build (and push on non-PR events) ─────────────────────────────
      # SQLX_OFFLINE=true is set inside the Dockerfile already, so the build
      # does not require a live database at image build time.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: reuse layers from the last pushed image to speed up
          # the Rust compilation step on subsequent builds.
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
